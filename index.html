<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">
  <title>Photoreal Schwarzschild Black Hole</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      background: #000;
      color: #fff;
      font: 11px/1.5 Arial, sans-serif;
      text-transform: uppercase;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
      touch-action: none;
    }
    canvas:active { cursor: grabbing; }
    header, .help {
      position: fixed;
      z-index: 1;
      pointer-events: none;
    }
    header { top: 24px; left: 28px; }
    h1 { margin: 0; color: #fff; font-size: 13px; letter-spacing: .14em; }
    header p { margin: 4px 0 0; color: #888; letter-spacing: .08em; }
    .help {
      right: 28px;
      bottom: 24px;
      color: #888;
      letter-spacing: .08em;
      text-align: right;
    }
    button {
      position: fixed;
      z-index: 2;
      top: 24px;
      right: 28px;
      border: 1px solid #777;
      padding: 7px 11px;
      background: #000;
      color: #fff;
      font: inherit;
      text-transform: uppercase;
      letter-spacing: .08em;
      cursor: pointer;
    }
    button:hover, button:focus-visible { border-color: #fff; color: #fff; outline: 0; }
    .error { position: fixed; inset: 0; display: grid; place-items: center; color: #fff; }
    @media (max-width: 600px) {
      header { top: 18px; left: 18px; }
      button { top: 18px; right: 18px; }
      .help { right: 18px; bottom: 18px; max-width: 220px; }
    }
  </style>
</head>
<body>
  <canvas id="space" aria-label="Photoreal Schwarzschild black hole with a luminous accretion disk. Drag to orbit, shift-drag to move, and scroll to zoom."></canvas>
  <header>
    <h1>Black hole</h1>
    <p>Precomputed Schwarzschild geodesics · volumetric accretion disk</p>
  </header>
  <button id="reset" type="button">Reset view</button>
  <div class="help">Drag: orbit · Shift drag: move<br>Wheel or pinch: zoom</div>
  <script src="app.js"></script>
</body>
</html>
