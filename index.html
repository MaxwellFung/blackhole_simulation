<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>Photoreal Kerr Black Hole</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      body {
        --ui-opacity: 1;
        background: #000;
        color: #fff;
        font:
          11px/1.5 Arial,
          sans-serif;
        text-transform: uppercase;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: grab;
        touch-action: none;
      }
      canvas:active {
        cursor: grabbing;
      }
      header,
      .help {
        position: fixed;
        z-index: 1;
        pointer-events: none;
      }
      header,
      .help,
      .controls {
        opacity: var(--ui-opacity);
        transition: opacity 0.35s ease;
      }
      header {
        top: 24px;
        left: 28px;
      }
      h1 {
        margin: 0;
        color: #fff;
        font-size: 13px;
        letter-spacing: 0.14em;
      }
      header p {
        margin: 4px 0 0;
        color: #888;
        letter-spacing: 0.08em;
      }
      .help {
        right: 28px;
        bottom: 24px;
        color: #888;
        letter-spacing: 0.08em;
        text-align: right;
      }
      .controls {
        position: fixed;
        z-index: 2;
        top: 24px;
        right: 28px;
        display: flex;
        gap: 8px;
      }
      button {
        border: 1px solid #777;
        padding: 7px 11px;
        background: #000;
        color: #fff;
        font: inherit;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        cursor: pointer;
      }
      button:hover,
      button:focus-visible {
        border-color: #fff;
        color: #fff;
        outline: 0;
      }
      body.ui-hidden .controls {
        pointer-events: none;
      }
      #suit {
        position: fixed;
        z-index: 1;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: visible;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.8s ease;
        filter: drop-shadow(0 10px 18px #000);
      }
      body.falling #suit {
        opacity: 1;
      }
      #suit .left-arm,
      #suit .right-arm,
      #suit .legs {
        opacity: 1;
        transition: opacity 0.16s linear;
      }
      #suit .left-arm {
        transform-origin: 150px 900px;
        animation: left-drift 5.8s ease-in-out infinite alternate;
      }
      #suit .right-arm {
        transform-origin: 850px 900px;
        animation: right-drift 6.7s ease-in-out infinite alternate;
      }
      #suit .legs {
        transform-origin: 500px 1050px;
        animation: leg-drift 7.4s ease-in-out infinite alternate;
      }
      #suit .visor {
        fill: none;
        stroke: url(#visor-rim);
        stroke-width: 42;
        opacity: 0.6;
      }
      @keyframes left-drift {
        to {
          transform: rotate(1.8deg) translate(5px, -4px);
        }
      }
      @keyframes right-drift {
        to {
          transform: rotate(-2.1deg) translate(-4px, 5px);
        }
      }
      @keyframes leg-drift {
        to {
          transform: rotate(0.7deg) translateY(7px);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #suit * {
          animation: none !important;
        }
      }
      .error {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        color: #fff;
      }
      @media (max-width: 600px) {
        header {
          display: none;
        }
        .controls {
          top: 18px;
          right: auto;
          left: 50%;
          transform: translateX(-50%);
        }
        .help {
          right: 18px;
          bottom: 18px;
          max-width: 220px;
        }
      }
    </style>
  </head>
  <body>
    <canvas
      id="space"
      aria-label="Photoreal spinning Kerr black hole with a luminous accretion disk. Drag to orbit, shift-drag to move, and scroll to zoom."
    ></canvas>
    <header>
      <h1>Black hole</h1>
      <p>relativistically accurate</p>
    </header>
    <div class="controls">
      <button id="fall" type="button" aria-pressed="false">Fall mode</button>
      <button id="sound" type="button" aria-pressed="false">Sound: off</button>
      <button id="reset" type="button">Reset view</button>
    </div>
    <div class="help">
      Drag: orbit · Shift drag: move<br />Wheel or pinch: zoom
    </div>
    <svg
      id="suit"

      preserveAspectRatio="xMidYMid slice"
      aria-hidden="true"

          <stop offset="1" stop-color="#3f484e" />

        <linearGradient id="joint-fabric" x1="0" y1="0" x2="0" y2="1">
          <stop stop-color="#d8dddd" />
          <stop offset="1" stop-color="#555f63" />
        </linearGradient>
        <radialGradient id="glove-shade" cx=".35" cy=".25">
          <stop stop-color="#fffef2" />
          <stop offset=".65" stop-color="#aab1b1" />
          <stop offset="1" stop-color="#363f44" />
        </radialGradient>
        <linearGradient id="visor-rim" x1="0" y1="0" x2="0" y2="1">
          <stop stop-color="#84919a" stop-opacity=".15" />
          <stop offset=".55" stop-color="#dae0df" stop-opacity=".55" />
          <stop offset="1" stop-color="#11181d" stop-opacity=".9" />
        </linearGradient>
      </defs>
      <g class="left-arm">

            fill="url(#suit-fabric)"
          />
          <path
            d="M116 799 C145 806 173 821 198 842 L184 892 C155 871 125 855 95 850Z"
            fill="#c94d35"

          />

            d="M205 686 C232 707 250 725 265 746 L231 787 C211 767 190 750 166 737Z"

          />

            <path
              d="M-39 22 C-49-7-36-43-7-56 C20-68 48-53 54-24 L58 22 C54 51 28 68-2 62 C-22 58-34 43-39 22Z"
              fill="url(#glove-shade)"
            />
            <path
              d="M-25-28 L-41-53 M-6-39 L-14-68 M14-38 L17-67 M31-28 L43-53"
              fill="none"
              stroke="#dce0dc"
              stroke-width="13"
              stroke-linecap="round"
            />
            <path

              fill="none"
              stroke="#687276"
              stroke-width="8"
            />
          </g>
        </g>
      </g>
      <g class="legs">
        <path

      </g>
      <ellipse class="visor" cx="500" cy="490" rx="535" ry="570" />
    </svg>
    <script src="app.js"></script>
  </body>
</html>
